name: Opportunity Radar

on:
  schedule:
    # Every Monday 03:00 UTC = 08:30 IST - digest ready with morning coffee
    - cron: "0 3 * * 1"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run radar
        run: python radar.py

      - name: Commit digest and seen store
        run: |
          git config user.name "opportunity-radar"
          git config user.email "radar@users.noreply.github.com"
          git add digests/ data/
          git diff --cached --quiet || git commit -m "Radar digest $(date -u +%F)"
          git push

      - name: Open digest as a GitHub issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Opportunity Radar digest - $(date -u +%F)"
          gh issue create --title "$TITLE" --body-file digests/latest.md \
            --label radar || echo "Issue creation skipped (label may not exist yet)"
